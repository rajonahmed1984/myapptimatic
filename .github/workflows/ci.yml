name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, curl
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Lint (Pint)
        run: composer lint

      - name: Run tests
        run: php artisan test

      - name: Generate latest route snapshot
        run: |
          mkdir -p storage/app
          php artisan route:list --json > storage/app/routes-latest.json

      - name: Run UI migration audit
        run: php scripts/run-ui-migration-phase.php phase-baseline

      - name: Enforce UI migration gate
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          summary_path = Path("storage/app/migration-reports/latest-ui-metrics.json")
          if not summary_path.exists():
              print("UI migration gate failed: summary report not found:", summary_path)
              sys.exit(1)

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          totals = summary.get("summary", {})
          zero_keys = [
              "remaining_full_blade_ui_pages",
              "remaining_partial_blade_fragments",
              "ui_not_detected",
              "wrapper_dependent_routes",
          ]
          failures = {k: totals.get(k) for k in zero_keys if totals.get(k) != 0}

          if failures:
              print("UI migration gate failed.")
              print("Unexpected non-zero metrics:", failures)
              print("Summary totals:", totals)
              sys.exit(1)

          print("UI migration gate passed.")
          print({k: totals.get(k) for k in zero_keys})
          PY

      - name: Enforce standard React structure
        run: npm run check:react-standard

      - name: Build frontend
        run: npm run build

      - name: Cache checks
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan optimize:clear
